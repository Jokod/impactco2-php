name: Sync composer version with tag

on:
  push:
    branches:
      - main
      - develop
    tags:
      - '*'

permissions:
  contents: write

jobs:
  sync-version:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.event.repository.default_branch || github.ref }}

      - name: Sync composer.json version
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/* ]]; then
            TARGET_VERSION="${GITHUB_REF#refs/tags/}"
            TARGET_VERSION="${TARGET_VERSION#v}"
          else
            TARGET_VERSION="$(git tag --sort=-v:refname | head -1)"
            TARGET_VERSION="${TARGET_VERSION#v}"
          fi

          if [[ -z "$TARGET_VERSION" ]]; then
            echo "No git tag found, nothing to sync."
            exit 0
          fi

          CURRENT_VERSION="$(jq -r '.version' composer.json)"

          echo "Current composer.json version: $CURRENT_VERSION"
          echo "Target version: $TARGET_VERSION"

          if [[ "$CURRENT_VERSION" == "$TARGET_VERSION" ]]; then
            echo "Version already in sync."
            exit 0
          fi

          LOWEST="$(printf '%s\n%s\n' "$CURRENT_VERSION" "$TARGET_VERSION" | sort -V | head -1)"
          if [[ "$LOWEST" != "$CURRENT_VERSION" ]]; then
            echo "composer.json ($CURRENT_VERSION) is ahead of tag ($TARGET_VERSION), no change needed."
            exit 0
          fi

          jq --arg version "$TARGET_VERSION" '.version = $version' composer.json > composer.json.tmp
          mv composer.json.tmp composer.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add composer.json
          git commit -m "chore: sync composer.json version to $TARGET_VERSION"

          git pull --rebase || true
          git push
